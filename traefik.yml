api:
  insecure: true

providers:
  docker:
    exposedByDefault: false

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

certificatesResolvers:
  letsencryptresolver:
    acme:
      email: placeholder@example.com
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web
